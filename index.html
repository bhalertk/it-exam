<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>115 資訊管理實務 考試重點</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222632;--border:#2e3345;--accent:#4f8cff;--accent2:#6c5ce7;--text:#e2e6ef;--text2:#8b92a8;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--highlight:#4f8cff22}
[data-theme="light"]{--bg:#f0f2f5;--surface:#ffffff;--card:#f7f8fa;--border:#dce0e8;--accent:#2563eb;--accent2:#7c3aed;--text:#1a1d27;--text2:#5c6370;--green:#16a34a;--red:#dc2626;--orange:#d97706;--highlight:#2563eb14}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;padding-top:env(safe-area-inset-top);height:calc(56px + env(safe-area-inset-top));gap:12px;transition:background .3s,border-color .3s}
.header h1{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
.header h1 span{color:var(--accent);font-weight:900}
.tab-bar{display:flex;gap:4px;flex-shrink:0}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;transition:.2s;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:hover:not(.active){background:var(--card)}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;flex-shrink:0}
.theme-toggle{background:none;border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.theme-toggle:hover{background:var(--card);border-color:var(--accent)}

/* SIDEBAR */
.sidebar{position:fixed;top:calc(56px + env(safe-area-inset-top));left:0;bottom:0;width:280px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;z-index:90;transition:transform .3s,background .3s}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.nav-group{margin-bottom:4px}
.nav-dept{display:flex;align-items:center;padding:10px 20px;cursor:pointer;font-weight:700;font-size:14px;color:var(--text2);transition:.2s;gap:8px}
.nav-dept:hover{color:var(--text);background:var(--highlight)}
.nav-dept .arrow{transition:transform .2s;font-size:10px}
.nav-dept.open .arrow{transform:rotate(90deg)}
.nav-dept .badge{background:var(--accent2);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:auto;font-weight:400}
.nav-items{display:none;padding:0 0 8px}
.nav-items.show{display:block}
.nav-item{display:block;padding:6px 20px 6px 40px;font-size:13px;color:var(--text2);cursor:pointer;transition:.15s;border-left:2px solid transparent}
.nav-item:hover,.nav-item.active{color:var(--accent);background:var(--highlight);border-left-color:var(--accent)}

/* SEARCH */
.search-box{padding:8px 16px;margin-bottom:8px}
.search-box input{width:100%;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text2)}

/* MAIN */
.main{margin-left:280px;margin-top:calc(56px + env(safe-area-inset-top));padding:32px 40px 80px;max-width:900px}
.main h2{font-size:22px;font-weight:900;margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--accent);color:var(--accent)}
.main h3{font-size:17px;font-weight:700;margin:24px 0 10px;color:var(--text)}
.main h4{font-size:15px;font-weight:700;margin:16px 0 8px;color:var(--text2)}
.main p{margin:8px 0}
.main ul,.main ol{padding-left:24px;margin:8px 0}
.main li{margin:4px 0}
.main strong{color:var(--text);font-weight:700;background:var(--highlight);padding:0 3px;border-radius:3px}
.main blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;background:var(--highlight);border-radius:0 8px 8px 0;font-size:14px}
.main table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
@media(max-width:768px){.main table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}}
.main th{background:var(--card);padding:10px 12px;text-align:left;font-weight:700;border:1px solid var(--border);white-space:nowrap}
.main td{padding:8px 12px;border:1px solid var(--border);vertical-align:top}
.main tr:hover td{background:var(--highlight)}
.main code,.main pre{background:var(--card);border-radius:6px;font-size:13px}
.main code{padding:2px 6px}
.main pre{padding:16px;overflow-x:auto;margin:12px 0;border:1px solid var(--border);line-height:1.6}
.dept-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:20px 24px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.dept-header .dept-icon{font-size:36px}
.dept-header h1{font-size:24px;font-weight:900}
.dept-header p{color:var(--text2);font-size:13px;margin-top:4px}
.section{scroll-margin-top:calc(72px + env(safe-area-inset-top))}
mark{background:var(--orange);color:#000;padding:1px 4px;border-radius:3px;font-weight:700}

/* QUIZ */
.quiz-panel{margin-left:280px;margin-top:calc(56px + env(safe-area-inset-top));padding:32px 40px 80px;max-width:900px;display:none}
.quiz-top{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.quiz-top select{padding:8px 12px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;flex:1;min-width:0}
.quiz-top button{padding:8px 14px;border:none;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;white-space:nowrap;flex-shrink:0}
.quiz-top button:hover{opacity:.9}
.quiz-progress{margin-bottom:16px}
.quiz-progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.quiz-progress-text{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:4px}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:.2s}
.quiz-card .q-num{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:4px}
.quiz-card .q-dept{font-size:11px;color:var(--text2);margin-bottom:10px;background:var(--surface);display:inline-block;padding:2px 10px;border-radius:12px}
.quiz-card .q-text{font-size:15px;font-weight:500;margin-bottom:14px;line-height:1.7}
.quiz-option{display:block;padding:12px 14px;margin:6px 0;background:var(--surface);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s;font-size:14px;-webkit-tap-highlight-color:transparent}
@media(hover:hover){.quiz-option:hover:not(.correct):not(.wrong){border-color:var(--accent);background:var(--highlight)}}
.quiz-option:active:not(.correct):not(.wrong){border-color:var(--accent);background:var(--highlight)}
.quiz-option.correct{border-color:var(--green);background:#16a34a18;cursor:default}
.quiz-option.wrong{border-color:var(--red);background:#dc262618;cursor:default}
.quiz-option .opt-label{font-weight:700;margin-right:8px}
.quiz-explain{margin-top:16px;padding:14px 16px;background:var(--surface);border-radius:8px;font-size:13px;color:var(--text2);border-left:3px solid var(--green);display:none}
.quiz-explain.show{display:block}
.quiz-nav{display:flex;justify-content:center;margin-top:20px;gap:12px}
.quiz-nav button{padding:12px 32px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.quiz-nav .btn-next{background:var(--accent);color:#fff}
@media(hover:hover){.quiz-nav .btn-next:hover{opacity:.85}}
.quiz-nav .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
@media(hover:hover){.quiz-nav .btn-secondary:hover{border-color:var(--accent)}}
.quiz-summary{background:var(--card);border-radius:16px;padding:40px 32px;text-align:center}
.quiz-summary h2{color:var(--accent);margin-bottom:8px;font-size:20px}
.quiz-summary .big-score{font-size:72px;font-weight:900;margin:12px 0}
.quiz-summary .big-score.pass{color:var(--green)}
.quiz-summary .big-score.fail{color:var(--red)}
.quiz-summary p{color:var(--text2);margin:6px 0;font-size:14px}
.quiz-summary .btn-row{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.quiz-wrong-list{margin-top:24px;text-align:left}
.quiz-wrong-list h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--red)}
.quiz-wrong-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;font-size:13px;line-height:1.7}
.quiz-wrong-item .qw-q{font-weight:700;margin-bottom:6px}
.quiz-wrong-item .qw-a{color:var(--green)}

/* RESPONSIVE */
@media(max-width:768px){
  .header{padding:0 12px;padding-top:env(safe-area-inset-top);gap:8px}
  .header h1{font-size:13px;min-width:0}
  .tab-bar{gap:2px}
  .tab-btn{padding:6px 10px;font-size:12px}
  .theme-toggle{width:32px;height:32px;font-size:14px}
  .menu-toggle{display:block}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main,.quiz-panel{margin-left:0;padding:16px 16px 80px;padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right))}
  .section{scroll-margin-top:calc(72px + env(safe-area-inset-top))}
  .overlay{display:none;position:fixed;inset:0;background:#0008;z-index:85}
  .overlay.show{display:block}
  .quiz-controls{flex-direction:column;align-items:stretch}
  .quiz-controls .score{margin-left:0;text-align:center}
  .quiz-top{gap:6px}
  .quiz-top select{font-size:12px;padding:8px 8px}
  .quiz-top button{font-size:12px;padding:8px 10px}
  .quiz-card{padding:16px 14px}
  .quiz-card .q-text{font-size:14px}
  .quiz-option{padding:10px 12px;font-size:13px;margin:5px 0}
  .quiz-nav button{padding:12px 24px;font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  <h1><span>115</span> 資訊管理實務 考試重點</h1>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('read')">📖 閱讀</button>
    <button class="tab-btn" onclick="switchTab('quiz')">✏️ 測驗</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="切換主題">🌙</button>
</div>
<div class="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar"></nav>
<div class="main" id="readPanel"></div>
<div class="quiz-panel" id="quizPanel"></div>

<script>
// ====== DATA ======
const departments = [
  {id:'admin',icon:'🏢',name:'行政管理部',sections:[
    {t:'基本資訊',html:`<table><tr><th>項目</th><th>內容</th></tr><tr><td>管理單位</td><td><strong>行政管理部</strong>（財產科）</td></tr><tr><td>訂定日期</td><td>民國 <strong>113年5月9日</strong></td></tr><tr><td>核定層級</td><td>行政管理群群主管</td></tr></table>`},
    {t:'申請資格（第3條）⭐',html:`<p>符合以下<strong>任一</strong>條件，可填具「資訊大樓宿舍申請書」：</p><ol><li>設籍於<strong>新竹（含）以南、宜蘭、花蓮、台東、澎湖、金、馬</strong>等縣市</li><li>通勤單程達 <strong>60分鐘以上</strong></li><li>本行其他業務管理單位因<strong>執行業務需要</strong>之行員</li></ol><blockquote>申請需經<strong>單位主管核准</strong>後，送行政管理部財產科登記。</blockquote>`},
    {t:'配住順序（第4條）⭐',html:`<p>每間房原則住<strong>一人</strong>，優先順序：</p><ol><li><strong>主管級以上</strong>人員優先</li><li>新任或由符合第3條第1款縣市調任者</li><li>其餘按<strong>申請日期</strong>先後</li></ol>`},
    {t:'使用費（第5條）⭐',html:`<table><tr><th>房型</th><th>費用</th></tr><tr><td>單人房</td><td><strong>每月 5,000元</strong></td></tr><tr><td>雙人房</td><td><strong>每月 2,500元</strong></td></tr></table><p>費用自住宿行員<strong>當月薪資</strong>扣收。</p>`},
    {t:'住宿期限與退宿（第6條）⭐⭐',html:`<table><tr><th>情況</th><th>應辦事宜</th></tr><tr><td>住滿<strong>3年</strong></td><td>次日遷出</td></tr><tr><td>離職</td><td>離職日遷出</td></tr><tr><td>職務異動調離資訊管理群</td><td>調職生效日遷出</td></tr><tr><td>延長</td><td>最多<strong>1次</strong>，最長<strong>3年</strong></td></tr></table><p>損壞設備按<strong>採購或修繕價格</strong>賠償。</p>`},
    {t:'安全規定重點',html:`<h4>門禁（第7條）</h4><ul><li>須持<strong>員工識別證</strong>感應進出</li><li>不得任意調換房間、留宿他人、無居住事實或挪作其他用途</li></ul><h4>行為規範（第8條）</h4><ul><li>嚴禁<strong>酗酒、賭博</strong>及不正當行為</li><li>個人房間使用影音設備應<strong>戴耳機</strong></li></ul><h4>防火安全（第10條）⭐</h4><ul><li><strong>嚴禁</strong>使用炊膳設備（含加熱用電器）</li><li>不得堆放物品於<strong>樓梯及通道</strong></li></ul><h4>用電安全（第11條）⭐</h4><ul><li>嚴禁使用耗電功率 <strong>超過800瓦特（W）</strong> 以上之非生活必需電器</li></ul>`},
    {t:'緊急事故處置（第12條）⭐',html:`<table><tr><th>事故</th><th>處置方式</th></tr><tr><td><strong>空襲</strong></td><td>燈火管制、疏散、聽從大樓管理中心指導</td></tr><tr><td><strong>盜警</strong></td><td>撥打 <strong>110</strong> + 通報大樓管理中心</td></tr><tr><td><strong>火警</strong></td><td>消防栓或滅火器、撥打 <strong>119</strong> + 通報大樓管理中心</td></tr><tr><td><strong>颱風</strong></td><td>個人<strong>房間門窗電器自行關閉</strong></td></tr></table>`},
    {t:'違規處置（第13條）',html:`<ul><li>情節嚴重→得<strong>取消住宿資格</strong></li><li>列入<strong>平時考核及年度績效評核</strong>參考</li></ul>`}
  ]},
  {id:'hr',icon:'👥',name:'人力資源部',sections:[
    {t:'工作規則第17條（服務守則）⭐⭐',html:`<p>員工應以<strong>誠實、清廉、敬業</strong>精神，貫徹<strong>信賴、熱誠、創新</strong>之企業經營理念。</p><table><tr><th>款次</th><th>重點</th></tr><tr><td>第2款</td><td>職務無關之帳表文件<strong>不得翻閱</strong></td></tr><tr><td>第5款</td><td>不得藉職務便利<strong>營私舞弊</strong></td></tr><tr><td>第7款</td><td>涉及本身或家族利害事件→應<strong>迴避</strong></td></tr><tr><td>第9款</td><td>上級指示有服從義務；明知<strong>違反法令行規</strong>者不在此限</td></tr><tr><td>第15款</td><td>不得經營商業/投機事業/兼任公職（<strong>經本行同意</strong>除外）</td></tr><tr><td>第18款</td><td>員工<strong>相互間不得借貸</strong>；<strong>正當用途經主管報備</strong>除外 ⭐⭐</td></tr><tr><td>第19款</td><td>與客戶<strong>不得異常資金往來</strong>（借貸/代墊/帳戶流用）⭐⭐</td></tr><tr><td>第20款</td><td>秉持「<strong>顧客至上，服務第一</strong>」</td></tr><tr><td>第24款</td><td>不得攜帶<strong>違禁品或危險品</strong>；庫房禁止吸煙</td></tr><tr><td>第27款</td><td>不得有<strong>性騷擾</strong>行為</td></tr></table>`},
    {t:'員工平時考核要點⭐',html:`<h4>考核六大項目（第2條）</h4><ol><li><strong>品德生活</strong>：忠誠廉正、業務機密</li><li><strong>工作</strong>：效率、互助合作、服務顧客</li><li><strong>勤惰</strong>：準時上下班、遲到早退曠職</li><li><strong>學識</strong>：專業知識、進修情形</li><li><strong>才能</strong>：領導/協調/理解/表達/應變能力</li><li><strong>其他</strong>：儀態、身心健康、愛惜公物</li></ol><h4>關鍵數字</h4><table><tr><th>條次</th><th>重點</th></tr><tr><td>第4條</td><td>營業單位經理每季至少<strong>一次</strong>考核</td></tr><tr><td>第5條</td><td>人事管理員於<strong>次月五日以前</strong>登載月報表</td></tr><tr><td>第9條</td><td>發現疑似<strong>洗錢或資恐</strong>→向<strong>防制洗錢專責單位</strong>陳報</td></tr><tr><td>第14條</td><td>經<strong>董事長</strong>核定後實施</td></tr></table>`},
    {t:'特別考核事項（第3條）⭐',html:`<ul><li>生活奢侈腐化、賭博、進出不正當場所</li><li>暗中經營商業或從事<strong>股票投機</strong>買賣</li><li>與同事或客戶<strong>金錢往來頻繁或招標會倒會</strong></li><li>故意協助客戶<strong>洗錢</strong>（含稅務洗錢）</li><li>生活方式<strong>與薪資所得顯不相當</strong></li><li>無法合理解釋自有帳戶之<strong>大額資金進出</strong></li></ul>`},
    {t:'銀行法第125條之2（背信罪）⭐⭐',html:`<blockquote>銀行職員違背職務致生損害→<strong>處三年以上十年以下有期徒刑</strong>，得併科<strong>新臺幣一千萬元以上二億元以下罰金</strong>。</blockquote><p>工作規則第42條：侵占挪用公款→<strong>記大過二次免職</strong>。</p>`},
    {t:'重要函文速查⭐⭐',html:`<table><tr><th>日期</th><th>核心主旨</th></tr><tr><td>114/9/1</td><td>恪守法令、背信罪3~10年</td></tr><tr><td>114/12/3</td><td>新版<strong>員工行為承諾書</strong>，114年<strong>12月20日前</strong>完成簽署</td></tr><tr><td>115/1/14</td><td><strong>不得使用他人帳號密碼</strong>；<strong>密薪制</strong>不得洩漏</td></tr><tr><td>115/1/28</td><td>嚴守紀律，定期辦理<strong>職位輪調</strong>防弊</td></tr><tr><td>113/2/21</td><td>禁止透過<strong>行員家人帳戶</strong>不正常資金移轉</td></tr><tr><td>113/5/16</td><td>禁止以<strong>華銀支付</strong>代客戶繳稅</td></tr><tr><td>113/9/30</td><td>禁止與客戶<strong>約定特定利益/對價/負擔損失</strong></td></tr><tr><td>114/7/31</td><td>超時加班差勤管理最高<strong>扣10分</strong>；禁止<strong>情緒用語</strong></td></tr></table><p>宣導程序：文到<strong>一週內</strong>，由<strong>單位經理</strong>於內部會議宣導，人事管理員留存。</p>`}
  ]},
  {id:'sec',icon:'🔒',name:'資訊安全部',sections:[
    {t:'資訊安全推動小組⭐',html:`<table><tr><th>角色</th><th>人員</th></tr><tr><td>召集人</td><td>督導資訊管理群之<strong>副總經理</strong></td></tr><tr><td>副召集人</td><td>資安部/資作部/資規部<strong>經理</strong></td></tr><tr><td>委員</td><td>風管/法遵等單位主管及資訊單位<strong>科長級以上</strong></td></tr></table><p>會議頻率：每年<strong>一月、七月</strong>各一次，共<strong>二次</strong>。</p><h4>推動小組下設三個分組（SR-002）</h4><table><tr><th>分組</th><th>職責</th></tr><tr><td><strong>資訊安全執行分組</strong></td><td>規劃執行各項資安作業、風險評鑑與處置、教育訓練</td></tr><tr><td><strong>緊急處理分組</strong></td><td>重大資安事件緊急應變；每<strong>半年</strong>辦理持續營運計畫測試及演練</td></tr><tr><td><strong>資訊安全查核分組</strong></td><td>ISMS內部自行查核</td></tr></table>`},
    {t:'資訊安全風險評鑑⭐⭐',html:`<p>資訊資產五大類別：<strong>硬體、軟體、資料、文件、人員</strong></p><ul><li>由<strong>資訊資產保管者</strong>每<strong>半年</strong>執行一次，由<strong>擁有者</strong>覆核</li><li>風險可接受水準：<strong>17</strong></li><li>風險權值 = 資產價值 × 弱點權值 × 威脅權值</li><li>各因子分高(3)/中(2)/低(1)，最低1，最高<strong>27</strong></li></ul><blockquote><strong>17 是什麼意思？</strong> 風險權值最大為 3×3×3＝27。門檻值17約等於滿分的63%，代表「中高風險」臨界點：超過17即不可接受，須採取控制措施；17以下可接受但仍須記錄追蹤。</blockquote>`},
    {t:'資訊安全指標⭐',html:`<ul><li>量測範圍：<strong>機密性、完整性、可用性</strong></li><li>負責人員每年至少檢討<strong>一次</strong></li><li>按月統計之指標<strong>連續三期</strong>未達目標值→執行矯正措施</li></ul>`},
    {t:'資安政策與文件編碼⭐⭐',html:`<p>資訊安全政策（SP-001）：核定層級=<strong>董事會</strong>，每年至少審查<strong>一次</strong>。</p><table><tr><th>階層</th><th>代碼</th><th>全名</th></tr><tr><td>第一階（政策）</td><td><strong>SP</strong></td><td>Security Policy</td></tr><tr><td>第二階（規範）</td><td><strong>SR</strong></td><td>Security Regulation</td></tr><tr><td>第三階（作業程序）</td><td><strong>SW</strong></td><td>Security Workbook</td></tr></table><p>紀錄保存至少<strong>三年</strong>；銷毀需填申請單經核准後以<strong>碎紙機絞碎或撕毀</strong>。</p>`},
    {t:'教育訓練時數⭐⭐',html:`<table><tr><th>人員類別</th><th>時數</th></tr><tr><td>資安<strong>專責單位</strong>人員</td><td>≥ <strong>15小時</strong></td></tr><tr><td>其他單位人員</td><td>≥ <strong>3小時</strong></td></tr></table><p>年度計畫：<strong>1月中旬</strong>完成；成果陳報：<strong>1月底前</strong>。</p><p>資安職能外訓：預算內→<strong>經理</strong>核定；預算外→<strong>總經理</strong>核定。</p>`},
    {t:'電子郵件與社交工程演練⭐',html:`<p>危險附件：<strong>.exe .com .scr .bat .cmd .lnk</strong></p><p>禁止使用一切<strong>外部網頁式電子郵件</strong>。含多媒體檔/執行檔/加密檔/營業秘密→<strong>隔離</strong>。</p><p>社交工程演練：每年<strong>不定期至少二次</strong>，每次<strong>10封</strong>，對象<strong>全行員工</strong>。</p><p>未通過定義（5種）：下載圖片/點選圖片連結/點擊URL/開啟附檔/轉寄信件。</p><p>電子郵件定期放行申請期限：<strong>半年</strong>。</p>`},
    {t:'防火牆規則管理⭐',html:`<p>基本規則：行內→外開放<strong>http/https</strong>；郵件閘道→<strong>SMTP</strong>；其餘<strong>一律禁止</strong>。</p><table><tr><th>用途</th><th>期限</th></tr><tr><td>測試環境</td><td><strong>一年</strong></td></tr><tr><td>監控/權限管理/伺服器連線</td><td>最長<strong>五年</strong></td></tr></table><p>連線紀錄至少保留<strong>五年</strong>（IP/FTP/SSLVPN/監控日誌亦同）。</p>`},
    {t:'防毒軟體⭐',html:`<ul><li>每月執行<strong>一次</strong>全機掃描</li><li>掃描未完成率 ><strong>5%</strong> →<strong>扣2分</strong></li><li>觸發病毒告警→<strong>隔一營業日</strong>執行ANTIVIR01報表簽核（單位主管決行）</li><li>USB須先經<strong>掃毒機</strong>掃描確認無病毒</li></ul>`},
    {t:'資安事件分類與通報⭐⭐',html:`<table><tr><th>等級</th><th>情形</th></tr><tr><td><strong>重大</strong></td><td>機密等級資料洩漏/竄改；關鍵作業<strong>無法</strong>於RTO內回復</td></tr><tr><td><strong>一般</strong></td><td>內部限閱等級洩漏/竄改；關鍵作業<strong>可</strong>於RTO內回復</td></tr></table><p>緊急通報：<strong>30分鐘內</strong>。證券期貨通報系統資安聯絡人：<strong>資安管理科副科長</strong>。</p><h4>資安事件緊急應變三階段（SW-016）⭐</h4><table><tr><th>階段</th><th>說明</th></tr><tr><td><strong>事前安全防護</strong></td><td>訂定預防/應變對策、定期演練、日常監控、安全評估</td></tr><tr><td><strong>事中主動預警緊急應變</strong></td><td>蒐集危害通告、24小時監測工具、即時通報應變</td></tr><tr><td><strong>事後復原追蹤鑑識偵查</strong></td><td>備份復原、完整紀錄建檔、向檢警申請鑑識偵查、提報推動小組</td></tr></table><p>緊急應變演練：每年至少<strong>一次</strong>；演練完成後<strong>一個月內</strong>完成報告，陳主管核定備查。</p>`},
    {t:'客戶資料管控⭐',html:`<p>禁止透過<strong>Line/社群平台</strong>傳輸。下載後<strong>禁止複製列印影印</strong>。電子檔刪除後清除<strong>資源回收筒</strong>。備查簿保留<strong>7年</strong>。</p>`},
    {t:'弱點修補期限⭐⭐',html:`<table><tr><th>風險</th><th>第一類</th><th>第二類</th><th>第三類</th></tr><tr><td><strong>高風險以上</strong></td><td><strong>20</strong>日</td><td><strong>30</strong>日</td><td><strong>45</strong>日</td></tr><tr><td>中風險</td><td>60日</td><td>60日</td><td>60日</td></tr><tr><td>低風險</td><td>90日</td><td>90日</td><td>90日</td></tr></table><p>威脅情資評估：第一類<strong>1日</strong>/第二類<strong>2日</strong>/第三類<strong>3日</strong>。</p>`},
    {t:'雲端服務（SR-063）⭐',html:`<p><strong>SaaS</strong>=軟體即服務，<strong>PaaS</strong>=平台即服務，<strong>IaaS</strong>=基礎設施即服務。</p><p>提供者須通過<strong>ISO 27017/27018</strong>及<strong>CSA STAR</strong>認證。</p><p>客戶資料以<strong>我國境內</strong>儲存為原則；境外→我國留存備份。</p><p>規章每年至少<strong>檢視一次</strong>。重大境外委外服務→每年至少<strong>一次查核</strong>。</p>`},
    {t:'資安設備效能與監控⭐',html:`<p>設備效能要求：第1級<strong>70%</strong>/第2級<strong>80%</strong>/第3級<strong>90%</strong>以下。</p><p>量測標準：每日峰值達當月<strong>三分之二工作日</strong>以上。每年評估汰換<strong>一次</strong>。</p><p>監控時段：日班<strong>08:50~17:00</strong>、小夜班<strong>13:00~21:00</strong>。</p>`}
  ]},
  {id:'ops',icon:'⚙️',name:'資訊作業服務部',sections:[
    {t:'核心系統架構',html:`<p>核心系統：<strong>56項</strong>主要業務。架構：<strong>雙主機平行處理</strong>（Parallel Sysplex）+ HyperSwap。</p><p>台北主中心：<strong>2台</strong>主機 + <strong>2座</strong>磁碟機。中壢第二資訊中心：<strong>1台</strong>備援主機 + <strong>2座</strong>備援磁碟機。</p><p>資料庫：<strong>IMS</strong>=階層式、<strong>DB2</strong>=關聯式。</p><p>備援演練每年至少<strong>一次</strong>。</p>`},
    {t:'電腦系統三類分類（SR-003）⭐⭐',html:`<table><tr><th>類別</th><th>定義</th><th>舉例</th></tr><tr><td><strong>第一類</strong></td><td>直接客戶自動化服務/<strong>重大影響</strong></td><td>電子銀行/分行櫃台/ATM/SWIFT</td></tr><tr><td><strong>第二類</strong></td><td>經<strong>人工介入</strong>間接服務</td><td>作業中心/客戶服務</td></tr><tr><td><strong>第三類</strong></td><td>未接觸客戶/<strong>無影響</strong></td><td>人資/財會/物聯網設備</td></tr></table><p><strong>關鍵資訊作業</strong>=屬第一類且對營運有重大影響。</p><p>BIA營運衝擊分析每<strong>半年</strong>執行一次。重要名詞：<strong>MTPD/RTO/RPO</strong>。</p><blockquote><strong>為什麼要分類？</strong> 系統類別決定適用哪一套管控標準：第一類→弱點20日修補、重大變更須資安長主持；第二類→30日；第三類→45日最寬鬆。第一類也是「關鍵資訊作業」的認定標準，影響BIA執行、RTO設定、緊急演練要求。讀完資作部這節再看資安部和資規部，很多規定都會豁然開朗。</blockquote>`},
    {t:'密碼設定（SR-029）⭐⭐',html:`<table><tr><th>項目</th><th>規定</th></tr><tr><td>長度</td><td>≥ <strong>12字元</strong>（系統不支援最少<strong>8字元</strong>）</td></tr><tr><td>變更週期</td><td>最長<strong>90天</strong>或<strong>13週</strong></td></tr><tr><td>歷程</td><td>至少前<strong>3代</strong>不重複</td></tr><tr><td>錯誤鎖定</td><td>連續<strong>5次</strong>→帳號停用</td></tr><tr><td>最短使用</td><td>至少<strong>5天</strong></td></tr><tr><td>物聯網密碼</td><td>至少<strong>6位</strong></td></tr></table><blockquote><strong>為什麼「3代不重複」一定要搭配「最短使用5天」？</strong> 若只有3代不重複而無最短使用限制，員工可在同一天連改3次密碼（A→B→C→A），直接繞過3代保護、永遠回到原密碼。5天限制使這種規避需要至少15天，讓密碼輪換真正有效。</blockquote>`},
    {t:'最高權限管理（SR-032）⭐⭐',html:`<ul><li>密碼分為<strong>A/B part</strong>密封於機房保險櫃</li><li>網域特權帳號每<strong>三個月</strong>變更一次</li><li>正式環境使用時間：營業日<strong>下午一時</strong>起至翌日零時</li><li>操作行為<strong>錄影</strong>留存，備份至少<strong>五年</strong></li><li>每一營業日抽檢<strong>10件</strong>操作錄影</li><li>密碼函一經拆封→次一營業日<strong>重新設定密碼並重新彌封</strong></li></ul><blockquote><strong>為什麼密碼要分A/B兩部分分開保存？</strong> 這是「雙人持有控制（Dual Control）」：任何單人只持有A或B，都無法獨自啟用最高權限，必須兩人同時在場合用。確保最高權限的每次使用都有雙重見證，防止單人在無監督狀態下操作或竄改核心系統。</blockquote>`},
    {t:'機房管理（SR-037）⭐',html:`<table><tr><th>條文</th><th>重點</th></tr><tr><td>第3條</td><td>錄影保存至少<strong>三個月</strong></td></tr><tr><td>第8條</td><td>禁止攜入磁性/放射性/易燃性/易爆性物品；禁嬉戲吸煙飲食</td></tr><tr><td>第17條</td><td>溫度<strong>16~25°C</strong>；濕度<strong>40%~70%</strong></td></tr><tr><td>第19條</td><td>滅火藥劑以<strong>對設備損害最小</strong>為原則（避免灑水式）</td></tr><tr><td>第25條</td><td>送修設備應<strong>移除機密等級資料</strong></td></tr><tr><td>第26條</td><td>報廢前清除<strong>限閱等級以上資料</strong>；合格廠商銷毀、<strong>派員監督拍照</strong></td></tr></table>`},
    {t:'監控巡檢警戒值（SW-013）⭐',html:`<table><tr><th>項目</th><th>警戒值</th></tr><tr><td><strong>磁碟</strong>使用率</td><td><strong>80%</strong></td></tr><tr><td><strong>CPU/記憶體</strong>使用率</td><td><strong>90%</strong></td></tr><tr><td><strong>網路頻寬</strong>使用率</td><td><strong>85%</strong></td></tr></table><p>批次作業期間不納入警戒值限制。</p>`},
    {t:'緊急事故處置（SR-011）⭐⭐',html:`<p>處置小組：資規部+資作部+資安部，召集人=事故發生部門<strong>部主管</strong>。</p><p>通報：各單位→<strong>資訊服務科</strong>→<strong>30分鐘內</strong>通報群主管等。影響客戶→通知<strong>客戶服務部</strong>。</p>`},
    {t:'變更管理（SR-013）⭐',html:`<p>一般變更：<strong>副主管</strong>以上核可。重要變更：<strong>單位主管</strong>核可。</p><p>重大變更（核心/一類系統）→<strong>資訊安全長</strong>主持變更管理會議。</p><p>農曆春節：假期始日<strong>前一個月起</strong>禁止變更（例外需群主管書面同意）。</p>`},
    {t:'端末電腦與報表⭐',html:`<p>LD01報表（USB使用）：決行人員<strong>單位副主管</strong>以上。LD02報表（共用資料夾）：線上簽核。</p><p>端末電腦一律<strong>加入網域</strong>、安裝資產管理軟體、收回本機最高權限、停用Guest。</p><p>特殊權限每<strong>半年</strong>清查。物聯網設備清冊每年更新。IP清查每年至少<strong>一次</strong>。</p><p>硬碟銷毀：<strong>消磁→物理破壞→合格廠商實體銷毀</strong>。格紋袋Y-003/密封袋Y-005。</p>`},
    {t:'金融卡廢卡（SR-020）⭐',html:`<p>作廢金融卡由<strong>資訊服務科</strong>打洞，<strong>資訊內控管理科</strong>專人保管。</p><p>每隔<strong>二年</strong>或累計<strong>二千張</strong>→簽報<strong>副總經理</strong>核准→<strong>駐行稽核</strong>會同銷毀。</p>`},
    {t:'行動裝置管理（SR-041）⭐',html:`<p>規範使用<strong>行動裝置（平板或智慧型手機）</strong>連接至本行內部網路之安全事項。</p><table><tr><th>表單編號</th><th>名稱</th><th>填寫時機</th></tr><tr><td><strong>SR-041-001</strong></td><td>行動裝置資源存取申請單</td><td><strong>首次使用</strong>行動裝置存取本行電子郵件；或遇<strong>調/離職</strong>；或行動裝置<strong>遺失或故障需維修</strong>時</td></tr><tr><td><strong>SR-041-002</strong></td><td>行動裝置使用暨<strong>隱私權責</strong>同意書</td><td>初次申請以行動裝置存取本行電子郵件時簽署</td></tr></table>`},

  {dept:'資訊安全部',q:'資訊安全組織下設哪三個分組？',opts:['規劃/執行/查核','執行/緊急處理/查核','規劃/監控/處理','開發/測試/維運'],ans:1,exp:'下設資訊安全執行分組、緊急處理分組、資訊安全查核分組。'},
  {dept:'資訊安全部',q:'紀錄銷毀應以何種方式處理？',opts:['直接丟棄','以碎紙機絞碎或撕毀','交由資源回收','焚燒處理'],ans:1,exp:'方式必須「無法回復」：普通撕碎可能被拼湊還原，碎紙機切割才符合要求。此原則與硬碟銷毀（消磁→物理破壞→委外銷毀）同樣強調：資料銷毀必須達到不可逆程度。'},
  {dept:'資訊安全部',q:'資訊人員離調職時應填寫什麼？',opts:['資訊作業需求申請單','員工離調職移交清單','系統資源使用者申請單','變更申請單'],ans:1,exp:'依SR-008第5條，應填寫「員工離(調)職移交清單」。'},
  {dept:'資訊安全部',q:'資訊安全教育訓練內容應包含下列何者？',opts:['僅資安法令規定','僅資安技術','僅資安事件案例','以上皆應包含'],ans:3,exp:'應包含ISMS規範、法令規定、資安事件案例宣導、資安技術、雲端服務資安宣導。'},
  {dept:'資訊安全部',q:'海外分行弱點掃描結果應於幾個月內完成修補？',opts:['一個月','二個月','三個月','六個月'],ans:2,exp:'應於三個月內完成風險評估及必要之修補與複測。'},
  {dept:'資訊安全部',q:'海外分行備援演練完成後幾個月內陳報總行？',opts:['一週內','二週內','一個月內','三個月內'],ans:2,exp:'備援演練完成後於一個月內將演練情形陳報總行。'},
  {dept:'資訊安全部',q:'海外分行每半年執行備援演練，年度內應含哪兩種？',opts:['全面與局部','同地與異地','模擬與實況','軟體與硬體'],ans:1,exp:'年度內一次同地備援演練，一次異地備援演練。'},
  {dept:'資訊安全部',q:'國外分行防火牆操作紀錄至少保存幾年？',opts:['一年','三年','五年','七年'],ans:2,exp:'防火牆操作紀錄及連線紀錄至少須保存五年。'},
  {dept:'資訊安全部',q:'SWIFT電文作業電腦有何限制？',opts:['限使用加密連線','不能使用電子郵件','須安裝防毒軟體','須每日備份'],ans:1,exp:'SWIFT電文作業以使用與外部網路隔離之獨立電腦為原則，不能使用電子郵件。'},
  {dept:'資訊安全部',q:'防毒軟體病毒定義檔應確認為最近幾天內？',opts:['三天','五天','七天','十四天'],ans:2,exp:'七天內是確保定義檔具時效性的最低標準：超過七天的定義檔對近期出現的新病毒完全無效。此為稽核查核標準，實際應更頻繁更新（理想每日自動更新）。若定義檔逾七天即屬不符規定。'},
  {dept:'資訊安全部',q:'觸發病毒告警後，ANTIVIR01報表應由誰決行？',opts:['科主管','副主管','單位主管','經理'],ans:2,exp:'設定單位主管為決行人員。'},
  {dept:'資訊安全部',q:'重大資訊安全事件的定義包含下列何者？',opts:['一般等級資料洩漏','關鍵作業可於RTO內回復','機密等級資料遭洩漏或竄改','內部限閱資料遭洩漏'],ans:2,exp:'兩個觸發條件：①機密等級資料外洩/竄改（資料安全面）；②關鍵資訊作業（第一類系統）無法在RTO內恢復（服務可用性面）。符合任一條件即為重大事件，須啟動更高層級的通報與應變程序。'},
  {dept:'資訊安全部',q:'證券期貨市場資通安全事件初步通報應於知悉後多久內辦理？',opts:['15分鐘','30分鐘','60分鐘','2小時'],ans:1,exp:'應於本行知悉事件30分鐘內至通報系統辦理事件初步通報。'},
  {dept:'資訊安全部',q:'電子郵件經常性業務放行申請期限以多久為限？',opts:['三個月','半年','一年','二年'],ans:1,exp:'期限以半年為限，屆期應重新評估再行申請。'},
  {dept:'資訊安全部',q:'DLP機制有效性應由資安部多久召開會議檢視？',opts:['每季','每半年','每年','每二年'],ans:2,exp:'DLP機制之有效性應由資訊安全部每年召開會議檢視。'},
  {dept:'資訊安全部',q:'雲端服務注意事項每年至少檢視幾次？',opts:['不需檢視','一次','二次','四次'],ans:1,exp:'本注意事項每年至少檢視一次。'},
  {dept:'資訊安全部',q:'客戶資料儲存於境外時，境外資料保護法規有何要求？',opts:['需與我國相同','不得低於我國要求','無特別要求','需高於我國標準'],ans:1,exp:'境外當地資料保護法規不得低於我國要求。'},
  {dept:'資訊安全部',q:'資安設備效能量測標準為每日峰值達當月多少工作日？',opts:['二分之一','三分之二','四分之三','全部'],ans:1,exp:'量測標準為每日峰值達當月三分之二工作日以上。'},
  {dept:'資訊安全部',q:'資安設備汰換評估應多久執行一次？',opts:['每季','每半年','每年','每二年'],ans:2,exp:'每年應依本細項執行汰換設備評估一次。'},
  {dept:'資訊安全部',q:'資安監控日班時段為？',opts:['07:00~15:00','08:00~16:00','08:50~17:00','09:00~18:00'],ans:2,exp:'營業日常日班為上午八時五十分至下午五時。'},
  {dept:'資訊安全部',q:'資安威脅情資中Zero Day事件應由誰召開因應會議？',opts:['科主管','資訊安全部副主管','資訊安全部經理','副總經理'],ans:1,exp:'Zero Day事件需先通知科主管並由資訊安全部副主管召開因應會議。'},
  {dept:'資訊安全部',q:'第二類系統高風險弱點應於幾個營業日內修補？',opts:['20日','30日','45日','60日'],ans:1,exp:'三類修補期限：第一類20日、第二類30日、第三類45日。數字記憶：20/30/45，間距為10和15。第二類需人工介入才能服務客戶，重要性居中，期限也居中。'},
  {dept:'資訊安全部',q:'第三類系統高風險弱點應於幾個營業日內修補？',opts:['20日','30日','45日','60日'],ans:2,exp:'三類修補期限：第一類20日、第二類30日、第三類45日。第三類最寬鬆（45日），因其不接觸客戶資訊、對營運無直接影響，即使被攻擊，直接損失也最低。'},
  // 資訊作業服務部 追加
  {dept:'資訊作業服務部',q:'BIA營運衝擊分析由哪個單位每半年執行一次？',opts:['資訊安全部','資訊規劃開發部','資訊作業服務部','風險管理部'],ans:2,exp:'依SR-003第4條，資訊作業服務部每半年執行一次。'},
  {dept:'資訊作業服務部',q:'RTO的中文全名為何？',opts:['最大可容忍中斷時間','復原時間目標','資料回復時點目標','營運衝擊分析'],ans:1,exp:'RTO = Recovery Time Objective 復原時間目標。'},
  {dept:'資訊作業服務部',q:'RPO的中文全名為何？',opts:['最大可容忍中斷時間','復原時間目標','資料回復時點目標','營運衝擊分析'],ans:2,exp:'RPO = Recovery Point Objective 資料回復時點目標。'},
  {dept:'資訊作業服務部',q:'MTPD的中文全名為何？',opts:['最大可容忍中斷時間','復原時間目標','資料回復時點目標','最小可接受服務水準'],ans:0,exp:'MTPD = Maximum Tolerable Period of Disruption 最大可容忍中斷時間。'},
  {dept:'資訊作業服務部',q:'SR-003中，第三類電腦系統的定義為何？',opts:['直接提供客戶自動化服務','經人工介入間接服務','未接觸客戶資訊且對營運無影響','以上皆非'],ans:2,exp:'第三類：未接觸客戶資訊或服務且對營運無影響之系統或設備。'},
  {dept:'資訊作業服務部',q:'下列何者屬於第一類電腦系統？',opts:['人事系統','財會系統','ATM自動化服務','客戶服務系統'],ans:2,exp:'第一類包含電子銀行、分行櫃台、ATM、SWIFT等直接提供客戶自動化服務之系統。'},
  {dept:'資訊作業服務部',q:'密碼歷程紀錄至少前幾代不重複？',opts:['2代','3代','5代','8代'],ans:1,exp:'3代設計防止「改新→改回」規避：只禁1代時，員工今天改掉、明天改回，永遠用同一組。3代要求至少走過3個不同密碼。注意：必須搭配「最短使用5天」，否則可在一天內連改3次跳過3代限制。'},
  {dept:'資訊作業服務部',q:'密碼最短使用期限為幾天？',opts:['1天','3天','5天','7天'],ans:2,exp:'5天最短使用限制與「前3代不重複」配套：若無此限制，員工可在同一天改3次密碼（A→B→C→A），直接繞過3代保護。5天確保規避行為至少需要15天才能完成，讓密碼輪換真正有效。'},
  {dept:'資訊作業服務部',q:'最高權限帳號正式環境使用開始時間為？',opts:['上午九時','上午十時','下午一時','下午三時'],ans:2,exp:'下午一時：銀行早上至午間業務高峰已結束，此時啟用高權限操作衝擊最小，且在場人員可即時監督。至翌日零時：確保使用時間在單一工作日內，異常發現後仍可當日處置。'},
  {dept:'資訊作業服務部',q:'最高權限帳號操作錄影備份至少保留幾年？',opts:['一年','三年','五年','七年'],ans:2,exp:'操作行為錄影留存稽核軌跡紀錄並定期備份，備份資料應保留至少五年。'},
  {dept:'資訊作業服務部',q:'機房相對濕度應保持在什麼範圍？',opts:['30%~60%','40%~70%','50%~80%','20%~50%'],ans:1,exp:'依SR-037第17條，相對濕度保持百分之四十至百分之七十之間。'},
  {dept:'資訊作業服務部',q:'機房滅火藥劑選擇原則為何？',opts:['以成本最低為原則','以撲滅速度最快為原則','以對設備損害最小為原則','以涵蓋範圍最廣為原則'],ans:2,exp:'機房滅火首重「保護設備」而非「撲滅速度」：灑水系統雖快但會毀損所有電子設備；乾粉殘留物腐蝕電路板；CO₂等惰性氣體才是首選。設備修復成本遠低於資料滅失，因此損害最小化優先於滅火速度。'},
  {dept:'資訊作業服務部',q:'機房設備報廢前應清除什麼等級以上的資料？',opts:['一般等級','限制等級','限閱等級','機密等級'],ans:2,exp:'依SR-037第26條，應確實清除機器內部限閱等級以上之資料。'},
  {dept:'資訊作業服務部',q:'使用者閒置超過幾分鐘應強制自動登出？',opts:['5分鐘','10分鐘','15分鐘','30分鐘'],ans:1,exp:'使用者登入後若閒置時間超過10分鐘，應強制自動登出。'},
  {dept:'資訊作業服務部',q:'程式維護人員營業日上班前權限如何處理？',opts:['自動開放','由RACF人員REVOKE','由主管手動開放','無須處理'],ans:1,exp:'這是「職務分離」控制：程式維護人員不應在常規工作時間持有正式環境寫入權限。每日重設確保「每次使用都必須重新申請、留下紀錄」，防止維護人員在無監督狀態下修改正式環境。'},
  {dept:'資訊作業服務部',q:'LD01報表決行人員為何職級？',opts:['科主管','單位副主管以上','單位主管','經理'],ans:1,exp:'LD01報表決行人員為「單位副主管」以上。'},
  {dept:'資訊作業服務部',q:'金融卡廢卡銷毀需經何人核准？',opts:['科主管','經理','副總經理','總經理'],ans:2,exp:'簽報副總經理核准後，由駐行稽核會同銷毀。'},
  {dept:'資訊作業服務部',q:'金融卡廢卡每隔幾年應辦理銷毀？',opts:['一年','二年','三年','五年'],ans:1,exp:'每隔二年或累計張數達二千張時辦理銷毀。'},
  {dept:'資訊作業服務部',q:'端末電腦設備硬碟銷毀流程的正確順序為何？',opts:['物理破壞→消磁→實體銷毀','消磁→物理破壞→實體銷毀','實體銷毀→消磁→物理破壞','消磁→實體銷毀→物理破壞'],ans:1,exp:'三步驟各有作用：①消磁：磁訊號歸零，即使外觀完好也無法讀取；②物理破壞：進一步破壞碟片，確保消磁不完全時也無法恢復；③合格廠商實體銷毀：合法處置廢棄材料並取得銷毀證明。順序不可顛倒。'},
  {dept:'資訊作業服務部',q:'報廢硬碟應裝入哪兩種袋子？',opts:['塑膠袋和紙袋','格紋袋Y-003和密封袋Y-005','防靜電袋和氣泡袋','鋁箔袋和夾鏈袋'],ans:1,exp:'裝入專用格紋袋(Y-003)及專用密封袋(Y-005)。'},
  {dept:'資訊作業服務部',q:'監控巡檢中網路頻寬使用率警戒值為？',opts:['70%','80%','85%','90%'],ans:2,exp:'依SW-013，頻寬使用率警戒值為85%。'},
  {dept:'資訊作業服務部',q:'緊急事故處置小組中，事故通報組負責單位為？',opts:['資訊規劃開發部','資訊安全部','資訊作業服務部副主管及資訊服務科','連線管理科'],ans:2,exp:'事故通報組負責單位為資訊作業服務部副主管及資訊服務科主管。'},
  {dept:'資訊作業服務部',q:'資訊作業演練得採行的方式不包含下列何者？',opts:['書面模擬演練','資料復原模擬演練','情境模擬演練','社交工程演練'],ans:3,exp:'演練方式包含書面模擬、資料復原模擬、情境模擬及實況演練，社交工程屬資安部。'},
  {dept:'資訊作業服務部',q:'SR-003資訊作業營運持續管理注意事項經何層級核定？',opts:['資訊管理群群主管','資訊安全長','總經理','董事會'],ans:2,exp:'SR-003經總經理核定後實施。'},
  {dept:'資訊作業服務部',q:'IMS資料庫屬於哪種類型？',opts:['關聯式','階層式','網狀式','物件導向式'],ans:1,exp:'IMS為連線交易系統，屬於階層式資料庫。'},
  {dept:'資訊作業服務部',q:'異地備援主機設置於何處？',opts:['台北主中心','中壢第二資訊中心','高雄備援中心','新竹機房'],ans:1,exp:'異地備援主機設置於中壢第二資訊中心。'},
  {dept:'資訊作業服務部',q:'財金憑證（金融EDI/XML）的用戶憑證匯入時，應使用哪個系統？',opts:['金融EDI憑證管理系統','FEDI系統','員工網站協同作業FXML安控系統憑證註冊系統','台灣網路認證公司網站'],ans:2,exp:'財金憑證（金融EDI及金融XML）之用戶憑證匯入路徑：員工網站 ▸ 協同作業 ▸ FXML安控系統 ▸ 憑證註冊系統。'},
  {dept:'資訊作業服務部',q:'稅費憑證（TEDI）產生憑證申請檔時，應登入哪個系統？',opts:['稅費憑證管理系統','關貿網路系統','員工網站協同作業FXML安控系統憑證安控系統','台灣網路認證公司網站'],ans:2,exp:'稅費憑證申請檔產生路徑：員工網站 ▸ 協同作業 ▸ FXML安控系統 ▸ 憑證安控系統。'},
  {dept:'資訊作業服務部',q:'MasterCard IPK憑證現行申請方式為何？',opts:['使用MemberRequestTool軟體並以email寄送','郵寄日本MasterCard總部','上MasterCard網站（mastercardconnect.com）申請並下載','向電子系統科提出申請'],ans:2,exp:'現行規定為上MasterCard網站（mastercardconnect.com）申請憑證並下載，匯入P3資料準備系統。'},
  {dept:'資訊作業服務部',q:'JCB IPK憑證現行申請方式為何？',opts:['以email寄送至日本JCB','郵寄IPK憑證申請表至日本','填寫申請表上傳至JCB網站申請','向個金行銷部轉請申請'],ans:2,exp:'現行規定為填寫IPK憑證申請表，上傳至JCB網站申請憑證（不再以email或郵寄方式）。'},

  {dept:'資訊規劃開發部',q:'依SW-007，密碼應如何存放於資料庫？',opts:['可以明碼存放','必須以明碼存放以利查詢','不得以明碼形式存放','需加上日期戳記後存放'],ans:2,exp:'明碼存放等於任何能讀取資料庫的人都能直接看到密碼。正確做法是用單向雜湊（如bcrypt）儲存：即使資料庫外洩，攻擊者也無法逆推原始密碼。明碼存放是最常見的資安缺失之一。'},
  {dept:'資訊規劃開發部',q:'依SW-007，程式碼中可否將使用者代碼及密碼寫入程式模組？',opts:['可以，但需加密','可以，但需主管核准','不得寫入（禁止hard-code帳密）','僅測試環境可以'],ans:2,exp:'Hard-code帳密的危險：①原始碼進版本控制後永久留存，所有接觸過原始碼的人都知道這組帳密；②密碼需更換時必須修改程式並重新部署；③原始碼外洩即等同帳密外洩。應改由設定檔或金鑰管理服務讀取。'},

// ====== RENDER QUIZ ======
let quizState={questions:[],current:0,score:0,answers:[],phase:'question'};

function renderQuizPanel(){
  const p=document.getElementById('quizPanel');
  let opts='<option value="all">全部部門</option>';
  departments.forEach(d=>opts+=`<option value="${d.name}">${d.icon} ${d.name}</option>`);
  p.innerHTML=`
    <div class="quiz-top">
      <select id="quizDept">${opts}</select>
      <button onclick="startQuiz()">🔄 重新出題</button>
    </div>
    <div id="quizArea"></div>`;
  startQuiz();
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  const dept=document.getElementById('quizDept').value;
  let pool=dept==='all'?[...quizBank]:quizBank.filter(q=>q.dept===dept);
  pool=shuffle(pool).slice(0,Math.min(20,pool.length));
  quizState={questions:pool,current:0,score:0,answers:new Array(pool.length).fill(-1),phase:'question'};
  showQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showQuestion(){
  const{questions,current,score,answers}=quizState;
  const total=questions.length;
  const q=questions[current];
  const answered=answers[current]>=0;
  const correct=q.ans;
  const picked=answers[current];
  const labels=['A','B','C','D'];
  const pct=Math.round((current+(answered?1:0))/total*100);

  let h=`<div class="quiz-progress"><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div><div class="quiz-progress-text"><span>第 ${current+1} / ${total} 題</span><span>✅ ${score} 對</span></div></div>`;
  h+=`<div class="quiz-card"><div class="q-num">第 ${current+1} 題</div><div class="q-dept">${q.dept}</div><div class="q-text">${q.q}</div>`;
  q.opts.forEach((o,oi)=>{
    let cls='quiz-option';
    if(answered){
      if(oi===correct)cls+=' correct';
      else if(oi===picked&&picked!==correct)cls+=' wrong';
    }
    const click=answered?'':`onclick="pickAnswer(${oi})"`;
    h+=`<div class="${cls}" ${click}><span class="opt-label">${labels[oi]}</span>${o}</div>`;
  });
  if(answered){
    h+=`<div class="quiz-explain show">💡 ${q.exp}</div>`;
  }
  h+=`</div>`;
  // nav buttons
  h+=`<div class="quiz-nav">`;
  if(current>0) h+=`<button class="btn-secondary" onclick="prevQuestion()">◀ 上一題</button>`;
  if(answered){
    if(current<total-1) h+=`<button class="btn-next" onclick="nextQuestion()">下一題 ▶</button>`;
    else h+=`<button class="btn-next" onclick="showSummary()">查看結果 🎯</button>`;
  }
  h+=`</div>`;
  document.getElementById('quizArea').innerHTML=h;
}

function pickAnswer(oi){
  const{questions,current}=quizState;
  quizState.answers[current]=oi;
  if(oi===questions[current].ans)quizState.score++;
  showQuestion();
}
function nextQuestion(){quizState.current++;showQuestion();window.scrollTo({top:0,behavior:'smooth'});}
function prevQuestion(){quizState.current--;showQuestion();window.scrollTo({top:0,behavior:'smooth'});}

function showSummary(){
  const{questions,score,answers}=quizState;
  const total=questions.length;
  const pct=Math.round(score/total*100);
  const pass=pct>=60;
  let h=`<div class="quiz-summary">`;
  h+=`<h2>測驗完成！</h2>`;
  h+=`<div class="big-score ${pass?'pass':'fail'}">${pct}%</div>`;
  h+=`<p>答對 <strong>${score}</strong> / ${total} 題</p>`;
  h+=`<div class="btn-row"><button class="btn-next" onclick="startQuiz()" style="padding:12px 32px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff">🔄 再測一次</button></div>`;
  // wrong answers review
  const wrongs=[];
  questions.forEach((q,i)=>{if(answers[i]!==q.ans)wrongs.push({q,picked:answers[i],idx:i});});
  if(wrongs.length>0){
    h+=`<div class="quiz-wrong-list"><h3>❌ 答錯的題目（${wrongs.length} 題）</h3>`;
    const labels=['A','B','C','D'];
    wrongs.forEach(w=>{
      h+=`<div class="quiz-wrong-item"><div class="qw-q">Q${w.idx+1}. ${w.q.q}</div>`;
      h+=`<div>你的答案：${labels[w.picked]} ${w.q.opts[w.picked]}</div>`;
      h+=`<div class="qw-a">正確答案：${labels[w.q.ans]} ${w.q.opts[w.q.ans]}</div>`;
      h+=`<div style="margin-top:4px;font-size:12px;color:var(--text2)">💡 ${w.q.exp}</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('quizArea').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ====== NAV FUNCTIONS ======
function toggleNav(el,di){
  el.classList.toggle('open');
  document.getElementById(`nav-${di}`).classList.toggle('show');
}
function scrollToSection(di,si){
  switchTab('read');
  const el=document.getElementById(`sec-${di}-${si}`);
  if(el)el.scrollIntoView({behavior:'smooth'});
  if(window.innerWidth<=768)toggleSidebar();
}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(tab==='read'?0:1)));
  document.getElementById('readPanel').style.display=tab==='read'?'block':'none';
  document.getElementById('quizPanel').style.display=tab==='quiz'?'block':'none';
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.overlay').classList.toggle('show');
}
function doSearch(val){
  const v=val.trim().toLowerCase();
  document.querySelectorAll('.section').forEach(sec=>{
    sec.style.display=(!v||sec.textContent.toLowerCase().includes(v))?'block':'none';
  });
  document.querySelectorAll('.dept-header').forEach(dh=>{dh.style.display=v?'none':'flex';});
}

// ====== THEME ======
function toggleTheme(){
  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme',isLight?'dark':'light');
  document.getElementById('themeBtn').textContent=isLight?'🌙':'☀️';
  try{localStorage.setItem('theme',isLight?'dark':'light');}catch(e){}
}
(function(){
  const html=document.documentElement;
  try{
    const t=localStorage.getItem('theme');
    if(t==='dark'){html.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',()=>{document.getElementById('themeBtn').textContent='🌙';});}
    else{html.setAttribute('data-theme','light');document.addEventListener('DOMContentLoaded',()=>{document.getElementById('themeBtn').textContent='☀️';});}
  }catch(e){html.setAttribute('data-theme','light');}
})();

// ====== INIT ======
renderSidebar();
renderReading();
renderQuizPanel();
// Auto open first nav group
document.querySelector('.nav-dept').click();
</script>
